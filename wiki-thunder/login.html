<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alistamento - WikiThunder</title>
    <link rel="stylesheet" href="./src/css/login-register.css">
    <link rel="stylesheet" href="./src/css/global.css">
    <link rel="stylesheet" href="./src/css/header.css">

    <script src="./src/js/sessao.js"></script>
    <script src="./src/js/login.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <a class="logo-redirect" href="./index.html">
                <img class="logo-img" src="./src/img/icons/logo_warthunder.png" alt="" height="50px">
            </a>
            <a class="alistar-redirect" href="./cadastro.html">
               <div class="alistar-box">
                    <span class="alistar-span">ALISTAR-SE</span>
               </div> 
            </a>
        </div>
    </header>
    <main>
        <div class="main-content">
            <div class="login">
                <div class="alerta_erro">
                    <div class="card_erro" id="cardErro">
                        <span id="mensagem_erro"></span>
                    </div>
                </div>
                <div class="container">
                    <div class="card card-login">
                        <h2>Reporte-se ao comando.</h2>
                        <div class="formulario">
                            <div class="campo">
                                <span>E-mail:</span>
                                <input id="email_input" type="text" placeholder="Login">
                            </div>
                            <div class="campo">
                                <span>Senha:</span>
                                <input id="senha_input" type="password" placeholder="******">
                            </div>
                            <button class="botao" onclick="entrar()">Entrar</button>
                        </div>
                        <div id="div_aguardar" class="loading-div">
                            <img src="./assets/circle-loading.gif" id="loading-gif">
                        </div>
                        <div id="div_erros_login"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
    </footer>
</body>
</html>
