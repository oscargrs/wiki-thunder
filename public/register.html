<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alistamento - WikiThunder</title>
    <link rel="stylesheet" href="./src/css/login-register.css">
    <link rel="stylesheet" href="./src/css/global.css">
    <link rel="stylesheet" href="./src/css/header.css">

    <script src="./src/js/sessao.js"></script>
    <script src="./src/js/register.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <a class="logo-redirect" href="./index.html">
                <img class="logo-img" src="./src/img/icons/logo-wt.png" alt="" height="50px">
            </a>
            <a class="alistar-redirect" href="./login.html">
               <div class="alistar-box">
                    <span class="alistar-span">REPORTAR-SE</span>
               </div> 
            </a>
        </div>
    </header>
    <main>
        <div class="main-content">
              <div class="register">
                <div class="alerta_erro">
                    <div class="card_erro" id="cardErro">
                        <span id="mensagem_erro"></span>
                    </div>
                </div>
                <div class="container">
                    <div class="card card-cadastro">
                        <h2>Recruta, seu chamado chegou. Aliste-se.</h2>
                        <div class="formulario">
                        <!--
                        Para inserir mais um campo, copie uma das inputs abaixo.
                        Assim que inserir vá para o script abaixo.
                        -->
                        <div class="campo">
                            <span>Nome de guerra:</span>
                            <input id="nome_input" type="text" placeholder="Seu nome" />
                        </div>
                        <div class="campo">
                            <span>E-mail de acesso:</span>
                            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
                        </div>
                        <div class="campo">
                            <span>Senha de acesso:</span>
                            <input id="senha_input" type="password" placeholder="******" />
                        </div>
                        <div class="campo">
                            <span>Confirmar senha:</span>
                            <input id="confirmacao_senha_input" type="password" placeholder="******" />
                        </div>
                            <button class="botao" onclick="cadastrar()">Alistar-se</button>
                        </div>
                        <div id="div_aguardar" class="loading-div">
                            <img src="./assets/circle-loading.gif" id="loading-gif" />
                        </div>
                        <div id="div_erros_login"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
    </footer>
</body>
</html>
