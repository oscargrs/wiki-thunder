<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alistamento - WikiThunder</title>
    <link rel="stylesheet" href="./assets/css/login-register.css">
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/header.css">

    <script src="./assets/js/sessao.js"></script>
    <script src="./assets/js/register.js"></script>
</head>
<body class="register">
    <header>
        <div class="header-content">
            <a class="logo-redirect" href="./index.html">
                <img class="logo-img" src="./assets/img/icons/logo-wt.png" alt="" height="50px">
            </a>
            <div class="header-right">
                <div class="user-info" id="userInfo">
                    <div class="user-dot"></div>
                    <span>Piloto:</span>
                    <span id="b_usuario">—</span>
                </div>
                <a class="alistar-redirect" href="./login.html" id="alistarRedirect">
                   <div class="alistar-box">
                        <span class="alistar-span" id="alistarSpan">REPORTAR-SE</span>
                   </div> 
                </a>
            </div>
        </div>
    </header>
    <main>
        <div class="main-content">
              <div class="register">
                <div class="alerta_erro">
                    <div class="card_erro" id="cardErro">
                        <span id="mensagem_erro"></span>
                    </div>
                </div>
                <div class="container">
                    <div class="card card-cadastro">
                        <h2>Recruta, seu chamado chegou. Aliste-se.</h2>
                        <div class="formulario">
                            <div class="campo">
                                <span>Nome de guerra:</span>
                                <input id="nome_input" type="text" placeholder="nickname" />
                            </div>
                            <div class="campo">
                                <span>E-mail de acesso:</span>
                                <input id="email_input" type="email" placeholder="meuemail@provedor.com" />
                            </div>
                            <div class="campo">
                                <span>Senha de acesso:</span>
                                <input id="senha_input" type="password" placeholder="******" />
                            </div>
                            <div class="campo">
                                <span>Confirmar senha:</span>
                                <input id="confirmacao_senha_input" type="password" placeholder="******" />
                            </div>
                            <div class="campo">
                                <span>Nação principal:</span>
                                <select id="nacao_input">
                                    <option value="">Selecione sua nação</option>
                                    <option value="usa">🇺🇸 Estados Unidos</option>
                                    <option value="germany">🇩🇪 Alemanha</option>
                                    <option value="ussr">🇷🇺 URSS</option>
                                    <option value="britain">🇬🇧 Grã-Bretanha</option>
                                    <option value="japan">🇯🇵 Japão</option>
                                    <option value="china">🇨🇳 China</option>
                                    <option value="italy">🇮🇹 Itália</option>
                                    <option value="france">🇫🇷 França</option>
                                    <option value="sweden">🇸🇪 Suécia</option>
                                    <option value="israel">🇮🇱 Israel</option>
                                </select>                        
                            </div>
                            <div class="campo">
                                <span>Especialização de combate:</span>
                                <select id="gameplay_input">
                                    <option value="">Selecione sua especialização</option>
                                    <option value="airplanes">Aviação</option>
                                    <option value="army">Blindados</option>
                                </select>
                            </div>
                            <button class="botao" onclick="cadastrar()">Alistar-se</button>
                        </div>
                        <div id="div_aguardar" class="loading-div">
                            <img src="./assets/img/icons/circle-loading.gif" id="loading-gif" />
                        </div>
                        <div id="div_erros_login"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="./assets/js/pages.js"></script>
    <script>validarSessao()</script>
</body>
</html>
