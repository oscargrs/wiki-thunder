<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangar - WikiThunder</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/hangar.css">
    <link rel="stylesheet" href="../assets/css/header.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <a class="logo-redirect" href="../index.html">
                <img class="logo-img" src="../assets/img/icons/logo-wt.png" alt="" height="50px">
            </a>
            <div class="title-page">
                <span class="title-span" id="titleSpan">Hangar</span>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-dot"></div>
                    <span>Piloto:</span>
                    <span id="b_usuario">—</span>
                </div>
                <a class="alistar-redirect" href="../login.html" id="alistarRedirect" onclick="limparSessao()">
                    <div class="alistar-box">
                        <span class="alistar-span" id="alistarSpan">Sair</span>
                    </div>
                </a>
            </div>
        </div>
        <div class="navigation-bar">
            <a class="vehicles-redirect" href="./curtidas.html">
                <span class="vehicles-span">CURTIDAS</span>
            </a>
        </div>
    </header>

    <main>
        <div class="hangar-content">
            <div class="stats-section">
                <span class="stats-title">Estatísticas da Plataforma</span>
                <hr class="stats-divider">
                <div class="kpis-row">
                    <div class="kpi-card" id="usuariosCadastrados">
                        <span class="kpi-label">USUÁRIOS CADASTRADOS</span>
                        <span class="kpi-valor" id="val-usuarios">—</span>
                        <span class="kpi-sublabel">pilotos registrados</span>
                    </div>
                    <div class="kpi-card" id="totalVeiculos">
                        <span class="kpi-label">VEÍCULOS NO BANCO</span>
                        <span class="kpi-valor" id="val-veiculos">—</span>
                        <span class="kpi-sublabel">entradas no catálogo</span>
                    </div>
                    <div class="kpi-card kpi-card-destaque" id="nacaoMaisPreferida">
                        <span class="kpi-label">NAÇÃO MAIS PREFERIDA</span>
                        <span class="kpi-valor" id="val-nacao">—</span>
                        <span class="kpi-sublabel" id="val-nacao-count"></span>
                    </div>
                    <div class="kpi-card kpi-card-destaque" id="especializacaoMaisPopular">
                        <span class="kpi-label">ESPECIALIZAÇÃO MAIS POPULAR</span>
                        <span class="kpi-valor" id="val-playstyle">—</span>
                        <span class="kpi-sublabel" id="val-playstyle-count"></span>
                    </div>
                </div>
            </div>
            <div class="graficos-row-top">
                <div class="grafico-panel grafico-wide" id="topCurtidos">
                    <h3 class="grafico-titulo">TOP VEÍCULOS MAIS CURTIDOS</h3>
                    <div class="grafico-wrapper">
                        <canvas id="canvasTopVeiculos"></canvas>
                    </div>
                </div>
                <div class="grafico-panel grafico-narrow" id="nacoesMaisPreferidas">
                    <h3 class="grafico-titulo">NAÇÃO MAIS PREFERIDA</h3>
                    <div class="grafico-wrapper">
                        <canvas id="canvasNacaoPreferida"></canvas>
                    </div>
                </div>
            </div>
            <div class="graficos-row-bottom">
                <div class="grafico-panel" id="curtidasPorNacao">
                    <h3 class="grafico-titulo">CURTIDAS POR NAÇÃO</h3>
                    <div class="grafico-wrapper">
                        <canvas id="canvasCurtidasPorNacao"></canvas>
                    </div>
                </div>
                <div class="grafico-panel" id="curtidasPorEspecializacao">
                    <h3 class="grafico-titulo">CURTIDAS POR ESPECIALIZAÇÃO</h3>
                    <div class="grafico-wrapper">
                        <canvas id="canvasCurtidasPorEspecializacao"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </main>
    <script src="../assets/js/hangar.js"></script>
    <script src="../assets/js/sessao.js"></script>
    <script>validarSessaoHangar();</script>
</body>
</html>
