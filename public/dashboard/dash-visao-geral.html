<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - WikiThunder</title>
    <link rel="stylesheet" href="../src/css/global.css">
    <link rel="stylesheet" href="../src/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../src/js/sessao.js"></script>
    <script src="../src/js/alerta.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <a class="logo-redirect" href="./index.html">
                <img class="logo-img" src="./src/img/icons/logo-wt.png" alt="" height="50px">
            </a>
            <a class="alistar-redirect" href="./login.html">
               <div class="alistar-box" onclick="limparSessao()">
                    <span class="alistar-span">Sair</span>
               </div> 
            </a>
        </div>
    </header>
    <main>
        <div class="main-content">
            <div class="stats">
                <span>Estatísticas da Plataforma</span>
                <hr>
                <div class="kpis">
                    <div class="usuarios-cadastrados" id="usuariosCadastrados">

                    </div>
                    <div class="veiculos-total" id="totalVeiculos">

                    </div>
                    <div class="nacao-preferida" id="nacaoMaisPreferida">

                    </div>
                    <div class="especializacao-popular" id="especializacaoMaisPopular">

                    </div>
                </div>
            </div>
            <div class="graficos-1">
                <div class="veiculos-favoritados" id="topFavoritos">

                </div>
                <div class="nacoes-preferidas" id="nacoesMaisPreferidas">

                </div>
            </div>
            <div class="graficos-2">
                <div class="favoritos-nacao" id="favoritosPorNacao">

                </div>
                <div class="favoritos-especializacao" id="favoritosPorEspecializacao">

                </div>
            </div>
        </div>
    </main>
</body>
</html>
