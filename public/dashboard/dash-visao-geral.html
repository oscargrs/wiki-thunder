<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - WikiThunder</title>
    <link rel="stylesheet" href="../src/css/global.css">
    <link rel="stylesheet" href="../src/css/dashboard.css">
    <link rel="stylesheet" href="../src/css/header.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../src/js/sessao.js"></script>
    <script src="../src/js/alerta.js"></script>
    <script src="../src/js/dashboard.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <a class="logo-redirect" href="../index.html">
                <img class="logo-img" src="../src/img/icons/logo-wt.png" alt="" height="50px">
            </a>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-dot"></div>
                    <span>Piloto:</span>
                    <span id="b_usuario">—</span>
                </div>
                <a class="alistar-redirect" href="../login.html">
                   <div class="alistar-box" onclick="limparSessao()">
                        <span class="alistar-span">Sair</span>
                   </div> 
                </a>
            </div>
        </div>
    </header>
    <main>
        <div class="dashboard-content">
 
            <div class="stats-section">
                <span class="stats-title">Estatísticas da Plataforma</span>
                <hr class="stats-divider">
                <div class="kpis-row">
                    <div class="kpi-card" id="usuariosCadastrados"></div>
                    <div class="kpi-card" id="totalVeiculos"></div>
                    <div class="kpi-card kpi-card-destaque" id="nacaoMaisPreferida"></div>
                    <div class="kpi-card kpi-card-destaque" id="especializacaoMaisPopular"></div>
                </div>
            </div>
 
            <div class="graficos-row-top">
                <div class="grafico-panel grafico-wide" id="topFavoritos"></div>
                <div class="grafico-panel grafico-narrow" id="nacoesMaisPreferidas"></div>
            </div>
 
            <div class="graficos-row-bottom">
                <div class="grafico-panel" id="favoritosPorNacao"></div>
                <div class="grafico-panel" id="favoritosPorEspecializacao"></div>
            </div>
 
        </div>
    </main>
</body>
</html>
