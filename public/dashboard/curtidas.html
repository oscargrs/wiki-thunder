<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curtidas - WikiThunder</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/cards.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <a class="logo-redirect" href="../index.html">
                <img class="logo-img" src="../assets/img/icons/logo-wt.png" alt="" height="50px">
            </a>
            <div class="title-page">
                <span class="title-span" id="titleSpan">Curtidas</span>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-dot"></div>
                    <span>Piloto:</span>
                    <span id="b_usuario">—</span>
                </div>
                <a class="alistar-redirect" href="../login.html" id="alistarRedirect" onclick="limparSessao()">
                    <div class="alistar-box">
                        <span class="alistar-span" id="alistarSpan">Sair</span>
                    </div>
                </a>
            </div>
        </div>
        <div class="navigation-bar">
            <a class="vehicles-redirect" href="./dash-visao-geral.html">
                <span class="vehicles-span">DASHBOARD</span>
            </a>
        </div>
    </header>

    <main>
        <div class="dashboard-content">
            <div class="stats-section">
                <span class="stats-title">Curtir veículos</span>
                <div class="search-bar">
                    <input type="text" id="ipt_search" class="search-input" placeholder="Buscar veículo...">
                    <button class="search-btn" onclick="carregarNome()">BUSCAR</button>
                </div>
                <div class="kpis-row">
                    <div class="veiculosEncontrados" id="veiculosEncontrados" style="display: none;">
                        <span class="kpi-label">veículos encontrados</span>
                        <div class="content" id="content">
                            <div class="cards" id="cards"></div>
                        </div>
                    </div>
                    <div class="likes-list" id="likesList"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/curtidas.js"></script>
    <script src="../assets/js/dashboard.js"></script>
    <script src="../assets/js/sessao.js"></script>
    <script>validarSessaoDash();</script>
    <script src="../assets/js/cards.js"></script>
</body>
</html>
